<!-- 
    IMAGE VIEWER
-->
<section id="imageViewWindowSection" class="" style="display: none;">
    <div class="" id="windowOverlayBlur">
         <div class="" id="windowContent">
             <!-- LEFT NAVBAR -->
             <div class="windowColumn" id="windowLeftColumn">
                 <div class="windowNavDivTop" id=""> 
                     <!-- empty -->
                 </div>
                 <!-- Previou image button -->
                 <div class="windowNavDivBottom" id="windowNavLeft">
                     <button class="windowNavigationImgButton" id="windowNavigationImgButtonLeft">
                         <img src="../assets/icons/arrow2.png" alt="previous image button icon" class="windowImgIcon windowNavigationImgButtonIcon" id="windowNavArrowLeft">
                     </button>
                 </div>
             </div> <!-- windowLeftColumn -->

             <!-- IMAGE SECTION -->
             <div class="windowColumn" id="windowMiddleColumn">
                 <div class="" id="imageDiv">
                     <img src="" class="" id="windowImageElem">
                 </div>
                 <div id="detailsDiv" class="">
                     <span id="imageNameSpan">Lorem ipsum</span>
                     <br id="imageDetailsNewLine">
                     <span id="imageDescriptionSpan">Lorem ipsum dolor sit amet consectetur adipisicing elit. Natus culpa porro architecto nobis explicabo ducimus. Modi laborum aut expedita impedit animi. Dolores aliquam quo beatae aperiam nam, fugiat obcaecati magnam?  </span>
                 </div>
             </div> <!-- windowMiddleColumn -->

             <!-- RIGHT NAVBAR -->
             <div class="windowColumn" id="windowRightColumn">
                 <!-- Close button -->
                 <div id="windowCloseButtonDiv" class="windowNavDivTop" onclick="CloseImageView()">  
                     <button class="windowNavigationImgButton" id="windowCloseButton">
                         <img src="../assets/icons/close.png " alt="close image button icon" class="windowImgIcon" id="windowCloseImg">
                     </button>
                 </div>
                 <!-- Next image button -->
                 <div class="windowNavDivBottom" id="windowNavRight">
                     <button class="windowNavigationImgButton" id="windowNavigationImgButtonRight">
                         <img src="../assets/icons/arrow2.png" alt="next image button icon" class="windowImgIcon windowNavigationImgButtonIcon" id="windowNavArrowRight">
                     </button>
                 </div>
                 <!-- Full image button -->
                 <div id="windowDownloadButtonDiv" class="windowNavDivTop">
                     <button class="windowNavigationImgButton" id="windowDownloadImageButton">  
                         <a href="#" class="" id="downloadImageLink" target="_blank" rel="noopener noreferrer">
                             <img src="../assets/icons/download.png " alt="download image button icon" class="windowImgIcon" id="windowDownloadImg">
                         </a>
                     </button>
                 </div>  
             </div> <!-- windowRightColumn -->
        </div> <!-- windowContent -->
    </div> <!-- windowOverlayBlur -->
</section> <!-- imageViewWindowSection -->
